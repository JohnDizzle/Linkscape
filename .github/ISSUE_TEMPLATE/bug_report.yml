name: Bug report
description: Report a reproducible problem in LinkScape
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide clear reproduction details.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the bug?
      placeholder: A clear and concise description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Scroll to ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Tabs
        - History
        - Favorites
        - Settings
        - Search
        - Command Center
        - Theming / Acrylic
        - Packaging / MSIX
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 24H2
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App/build version
      placeholder: e.g. commit SHA, local debug build, or store version
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste logs and/or add screenshots to help diagnose.
      placeholder: Drag screenshots here or paste relevant output.
    validations:
      required: false
